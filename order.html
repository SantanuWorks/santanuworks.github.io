<html>
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Order | PrettyCake</title>
	<link rel="stylesheet" href="css/style.css" type="text/css">
	<link rel="stylesheet" type="text/css" href="css/mobile.css">
	<script src="js/mobile.js" type="text/javascript"></script>
</head>
<body>
	<div id="page">
		<div id="header">
			<div>
				<a href="index.html" class="logo"><img src="images/logo.png" alt=""></a>
				<ul id="navigation">
					<li>
						<a href="index.html">Home</a>
					</li>
					<li class="selected">
						<a href="product.html">Cakes</a>
					</li>
					<li >
						<a href="contact.html">Feedback</a>
					</li>
				</ul>
			</div>
		</div>
		<div id="body">
			<div class="header">
				<div>
					<h1>Order</h1>
				</div>
			</div>
			<div class="singlepost">
				<div class="sidebar">
					<div class="product-tumb">
						<img style="width: 320px;" src="images/cantaloupe.jpg" alt="">
					</div>
					<div class="product-details">
						<h4 id="name-head" style="text-align: center; margin-top: 20px;">Women leather bag</h4>
						<h4 style="text-align: center;" >⭐⭐⭐⭐</h4>
						<div class="product-bottom-details" style="padding: 10px 15px; display: flex;align-items: center;justify-content: center;">
							<div class="product-price" >250.0 &nbsp<i> (per kg)</i></div>
						</div>
					</div>
				</div>
				<div class="featured">
					<form class="order-form" action="" method="post">
						<label>Full Name</label><br>
						<input class="form-input" type="text" placeholder="Your full name" name="name" required><br>
						<label>Mobile No</label><br>
						<input class="form-input" type="number" placeholder="Your mobile number" name="contact" required><br>
						<label>Cake Qty</label><br>
						<select class="form-input"  id="form-input-qty" name="qty" onchange="Calculate()" >
							<option value="0.5" >500g</option>
							<option value="1" selected>1Kg</option>
							<option value="2" >2Kg</option>
						</select><br>
						<label>Price</label><br>
						<input class="form-input" id="form-input-price" type="text" name="price" value="250" disabled><br>
						<input class="form-input" value="Order" id="form-input-btn" type="submit" name="submit">
					</form>
				</div>
			</div>
		</div>
		<div id="footer">
			<div>
				<div class="connect">
					<a href="http://freewebsitetemplates.com/go/facebook/" class="facebook">facebook</a>
					<a href="http://freewebsitetemplates.com/go/twitter/" class="twitter">twitter</a>
					<a href="http://freewebsitetemplates.com/go/googleplus/" class="googleplus">googleplus</a>
					<a href="http://pinterest.com/fwtemplates/" class="pinterest">pinterest</a>
				</div>
				<p>&copy; 2023 Freeeze. All Rights Reserved.</p>
			</div>
		</div>
	</div>

	<script type="text/javascript">
		function Calculate(argument) {
			let qty = document.getElementById('form-input-qty').value ;
			document.getElementById('form-input-price').value = qty * 250 ;
		}
	</script>
</body>
</html>
